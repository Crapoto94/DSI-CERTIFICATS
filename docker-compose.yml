services:
  backend:
    build: ./backend
    container_name: certif-backend
    restart: unless-stopped
    environment:
      - PORT=3001
    ports:
      - "4100:3001"
    volumes:
      - ./backend/database.sqlite:/app/database.sqlite
      - ./backend/file_certif:/app/file_certif
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: certif-frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - backend
